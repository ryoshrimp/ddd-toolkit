name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # ddd-toolkit-macro's trybuild UI tests build each fixture in an
      # isolated, non-workspace crate with cargo's --offline flag hardcoded
      # (trybuild always passes it). This workspace's [patch] on
      # ddd-toolkit-core's git URL means the *patched* build here never
      # fetches that git dependency for real, so trybuild's offline build
      # has nothing to find and fails with "you are in the offline mode".
      # Fetch it for real first, from a worktree outside this workspace
      # (so the patch doesn't apply), to warm cargo's git cache.
      - name: Warm cargo git cache for ddd-toolkit-macro's trybuild dependency
        run: |
          git -C ddd-toolkit-macro worktree add "$RUNNER_TEMP/ddd-toolkit-macro-standalone" HEAD
          cargo fetch --manifest-path "$RUNNER_TEMP/ddd-toolkit-macro-standalone/Cargo.toml"
          git -C ddd-toolkit-macro worktree remove --force "$RUNNER_TEMP/ddd-toolkit-macro-standalone"
      - run: cargo test --workspace --all-features

  feature-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/check-feature-matrix.sh

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings
